<!DOCTYPE html>
<html>
<head>
    <title>Assistant Créateur IA</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🎬 Assistant Créateur IA</h1>

<p>
Crée des idées de vidéos complètes avec l'intelligence artificielle.
</p>


<div class="box">

<h2>Créer une vidéo</h2>

<input id="theme" placeholder="Sujet de ta vidéo (ex: gaming, business...)">

<select id="plateforme">
    <option>TikTok</option>
    <option>YouTube Shorts</option>
    <option>Instagram Reels</option>
</select>

<select id="style">
    <option>Drôle</option>
    <option>Sérieux</option>
    <option>Storytelling</option>
    <option>Éducatif</option>
</select>


<button onclick="creerVideo()">
Créer ma vidéo 🚀
</button>


<div id="resultat"></div>


</div>


<script src="script.js"></script>

</body>
</html>
